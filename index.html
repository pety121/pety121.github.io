<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>NGSL 词表 · 个人学习工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', sans-serif;
      background-color: #faf8f2;
      color: #2e3b2c;
      transition: background-color 0.3s, color 0.3s;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.dark {
      background-color: #1e2a1e;
      color: #e0e6d8;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      padding: 1rem 1.2rem;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* 头部区域 */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      gap: 0.8rem;
    }

    .title-section {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #2d5a27;
    }

    body.dark h1 {
      color: #bcd9b2;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #5e6b55;
      background: #e9f0e3;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
    }

    body.dark .subtitle {
      background: #2e3d2e;
      color: #b9c9af;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-box input {
      width: 220px;
      padding: 0.6rem 1rem 0.6rem 2.4rem;
      border: 1px solid #c8d6c0;
      border-radius: 30px;
      background: white;
      font-size: 0.95rem;
      transition: all 0.2s;
      background-color: #ffffff;
      color: #2e3b2c;
    }

    body.dark .search-box input {
      background-color: #2b3822;
      border-color: #4b5e40;
      color: #e0e6d8;
    }

    .search-box input:focus {
      outline: none;
      border-color: #4f7a3f;
      box-shadow: 0 0 0 3px rgba(79, 122, 63, 0.2);
    }

    .search-icon {
      position: absolute;
      left: 0.9rem;
      color: #7e8d74;
      font-size: 1rem;
      pointer-events: none;
    }

    .theme-toggle {
      background: none;
      border: 1px solid #c8d6c0;
      border-radius: 30px;
      padding: 0.5rem 1rem;
      font-size: 1.1rem;
      cursor: pointer;
      background: white;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.2rem;
      color: #2e3b2c;
    }

    body.dark .theme-toggle {
      background: #2b3822;
      border-color: #4b5e40;
      color: #e0e6d8;
    }

    .theme-toggle:hover {
      background: #e9f0e3;
    }

    body.dark .theme-toggle:hover {
      background: #3d4f33;
    }

    /* 分页切换按钮 */
    .view-toggle-btn {
      background: white;
      border: 1px solid #c8d6c0;
      border-radius: 30px;
      padding: 0.5rem 1.1rem;
      font-size: 0.9rem;
      cursor: pointer;
      background: #ffffff;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      color: #2e3b2c;
      font-weight: 500;
    }

    body.dark .view-toggle-btn {
      background: #2b3822;
      border-color: #4b5e40;
      color: #e0e6d8;
    }

    .view-toggle-btn:hover {
      background: #e9f0e3;
    }

    body.dark .view-toggle-btn:hover {
      background: #3d4f33;
    }

    /* 统计与状态栏 */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
      color: #4b5a40;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    body.dark .stats-bar {
      color: #b0bd9f;
    }

    .word-count {
      background: #eef4e7;
      padding: 0.25rem 0.9rem;
      border-radius: 20px;
    }

    body.dark .word-count {
      background: #2f3d2a;
    }

    /* 表格容器 */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid #d4ddcb;
      background: white;
      box-shadow: 0 6px 16px rgba(0,0,0,0.03);
      transition: background 0.3s, border-color 0.3s;
      flex: 1;
    }

    body.dark .table-wrapper {
      background: #212e1e;
      border-color: #3f5335;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
      white-space: nowrap;
      table-layout: auto;
    }

    th {
      background: #e2efd6;
      font-weight: 600;
      padding: 0.9rem 0.8rem;
      text-align: left;
      border-bottom: 2px solid #b8caa6;
      border-right: 1px solid #c8d6c0;
      color: #1e3a1a;
      cursor: default;
      user-select: none;
      position: relative;
      transition: background 0.2s;
    }

    body.dark th {
      background: #2b3d26;
      border-bottom-color: #4a5e3e;
      border-right-color: #3f5335;
      color: #dce8d0;
    }

    th.sortable {
      cursor: pointer;
    }

    th.sortable:hover {
      background: #d0e2bf;
    }

    body.dark th.sortable:hover {
      background: #3e5534;
    }

    th .sort-indicator {
      margin-left: 0.3rem;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    td {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid #e3e8db;
      border-right: 1px solid #e3e8db;
      color: #2e3b2c;
      background-color: white;
    }

    body.dark td {
      background-color: #1e2a1a;
      border-bottom-color: #374e2e;
      border-right-color: #374e2e;
      color: #dbe4d0;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover td {
      background-color: #f5f9f0;
    }

    body.dark tbody tr:hover td {
      background-color: #2b3b24;
    }

    .sfi-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .progress-bar-bg {
      flex: 1;
      height: 7px;
      background: #e0e7da;
      border-radius: 10px;
      overflow: hidden;
      min-width: 60px;
    }

    body.dark .progress-bar-bg {
      background: #3a4c31;
    }

    .progress-fill {
      height: 100%;
      background: #d4a843;
      border-radius: 10px;
      transition: width 0.2s;
    }

    .fav-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
      padding: 0.2rem 0.4rem;
      line-height: 1;
    }

    .fav-btn.active {
      color: #e74c3c;
    }

    .fav-btn:hover {
      transform: scale(1.2);
    }

    .no-results {
      text-align: center;
      padding: 2.5rem !important;
      font-size: 1.1rem;
      color: #7e8d74;
    }

    /* 分页控件 */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .page-btn {
      background: white;
      border: 1px solid #c8d6c0;
      border-radius: 20px;
      padding: 0.4rem 0.9rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      color: #2e3b2c;
    }

    body.dark .page-btn {
      background: #2b3822;
      border-color: #4b5e40;
      color: #e0e6d8;
    }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .page-btn.active-page {
      background: #4f7a3f;
      color: white;
      border-color: #4f7a3f;
      font-weight: 600;
    }

    body.dark .page-btn.active-page {
      background: #608a4a;
      border-color: #608a4a;
    }

    /* 响应式：窄屏隐藏释义和收藏列 */
    @media (max-width: 650px) {
      .col-meaning, .col-fav {
        display: none;
      }
      .search-box input {
        width: 160px;
      }
      h1 {
        font-size: 1.5rem;
      }
    }

    footer {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #8a9a7e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-section">
        <h1>📗 NGSL 词表</h1>
        <span class="subtitle">高频词 · 个人标记</span>
      </div>
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="搜索单词或释义..." autocomplete="off">
        </div>
        <button id="viewToggleBtn" class="view-toggle-btn" title="切换分页 / 显示全部">
          📄 分页显示
        </button>
        <button id="themeToggle" class="theme-toggle" title="切换深色/浅色主题">
          🌙 深色
        </button>
      </div>
    </div>

    <div class="stats-bar">
      <span class="word-count" id="wordCount">加载中...</span>
      <span id="sortHint" style="font-size:0.8rem;">点击表头排序：序号/单词/SFI</span>
    </div>

    <div class="table-wrapper">
      <table id="wordTable">
        <thead>
          <tr>
            <th class="sortable" data-sort="index">序号 <span class="sort-indicator">↕</span></th>
            <th class="sortable" data-sort="word">单词 <span class="sort-indicator">↕</span></th>
            <th class="col-meaning">释义</th>
            <th class="sortable" data-sort="sfi">SFI 词频 <span class="sort-indicator">↕</span></th>
            <th class="col-fav">收藏</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- 动态渲染 -->
        </tbody>
      </table>
    </div>

    <div class="pagination" id="paginationContainer"></div>
    <footer>词汇数据源自 NGSL · 轻量学习工具</footer>
  </div>

  <script>
    (function() {
      // ---------- 全局状态 ----------
      let allWords = [];                 // 原始解析数据
      let filteredWords = [];           // 搜索过滤后的数据
      let currentSort = { field: 'index', order: 'asc' }; // 默认按序号升序
      let currentPage = 1;
      let pageSize = 100;              // 默认分页大小
      let showAll = false;             // 是否显示全部（不分页）
      
      // DOM 元素
      const searchInput = document.getElementById('searchInput');
      const tableBody = document.getElementById('tableBody');
      const viewToggleBtn = document.getElementById('viewToggleBtn');
      const themeToggle = document.getElementById('themeToggle');
      const wordCountSpan = document.getElementById('wordCount');
      const paginationContainer = document.getElementById('paginationContainer');
      const sortableHeaders = document.querySelectorAll('th.sortable');

      // ---------- 数据加载 ----------
      async function loadData() {
        try {
          const response = await fetch('data.txt');
          if (!response.ok) throw new Error('data.txt 加载失败');
          const text = await response.text();
          parseData(text);
        } catch (error) {
          console.error(error);
          tableBody.innerHTML = `<tr><td colspan="5" class="no-results">⚠️ 无法加载 data.txt，请确保文件存在于同目录下</td></tr>`;
          wordCountSpan.textContent = '0 个单词';
        }
      }

      function parseData(rawText) {
        const lines = rawText.split(/\r?\n/);
        const parsed = [];
        for (let line of lines) {
          line = line.trim();
          if (line === '') continue;
          // 跳过可能的表头行（包含 Number 或 Word 字样）
          if (/^(Number|Word|序号|单词)/i.test(line)) continue;
          
          const parts = line.split('\t');
          if (parts.length < 3) continue; // 至少需要单词、序号、SFI
          
          const word = parts[0].trim();
          const index = parseInt(parts[1], 10);
          const sfi = parseFloat(parts[2]);
          // 可选第4列频次，第5列释义
          const frequency = parts[3] ? parts[3].trim() : '';
          const meaning = parts.length >= 5 ? parts[4].trim() : '';
          
          if (isNaN(index) || isNaN(sfi) || !word) continue;
          
          parsed.push({
            word,
            index,
            sfi,
            frequency,
            meaning: meaning || '—',
            // 收藏状态稍后从 localStorage 读取
            favorite: false
          });
        }
        allWords = parsed;
        // 读取收藏状态
        loadFavorites();
        // 初始排序按序号升序
        sortData('index', 'asc');
        applyFilterAndRender();
      }

      // ---------- 收藏状态持久化 ----------
      function loadFavorites() {
        const favSet = getFavoritesFromStorage();
        allWords.forEach(w => {
          w.favorite = favSet.has(w.word);
        });
      }

      function getFavoritesFromStorage() {
        try {
          const stored = localStorage.getItem('ngsl_favorites');
          return stored ? new Set(JSON.parse(stored)) : new Set();
        } catch (e) {
          return new Set();
        }
      }

      function saveFavoritesToStorage(favSet) {
        localStorage.setItem('ngsl_favorites', JSON.stringify([...favSet]));
      }

      function toggleFavorite(word) {
        const favSet = getFavoritesFromStorage();
        if (favSet.has(word)) {
          favSet.delete(word);
        } else {
          favSet.add(word);
        }
        saveFavoritesToStorage(favSet);
        // 更新内存数据
        const target = allWords.find(w => w.word === word);
        if (target) target.favorite = favSet.has(word);
        // 同时更新 filteredWords 中对应项
        const filteredTarget = filteredWords.find(w => w.word === word);
        if (filteredTarget) filteredTarget.favorite = favSet.has(word);
        renderTable();
      }

      // ---------- 排序 ----------
      function sortData(field, order) {
        currentSort.field = field;
        currentSort.order = order;
        
        filteredWords.sort((a, b) => {
          let valA, valB;
          if (field === 'index') {
            valA = a.index;
            valB = b.index;
          } else if (field === 'word') {
            valA = a.word.toLowerCase();
            valB = b.word.toLowerCase();
          } else if (field === 'sfi') {
            valA = a.sfi;
            valB = b.sfi;
          } else {
            return 0;
          }
          
          if (valA < valB) return order === 'asc' ? -1 : 1;
          if (valA > valB) return order === 'asc' ? 1 : -1;
          return 0;
        });
      }

      // 表头点击处理
      sortableHeaders.forEach(th => {
        th.addEventListener('click', () => {
          const field = th.dataset.sort;
          if (!field) return;
          if (currentSort.field === field) {
            // 切换升降序
            const newOrder = currentSort.order === 'asc' ? 'desc' : 'asc';
            sortData(field, newOrder);
          } else {
            sortData(field, 'asc');
          }
          currentPage = 1;
          renderTable();
          updatePagination();
        });
      });

      // ---------- 搜索过滤 ----------
      function filterWords() {
        const query = searchInput.value.trim().toLowerCase();
        if (query === '') {
          filteredWords = [...allWords];
        } else {
          filteredWords = allWords.filter(w => 
            w.word.toLowerCase().includes(query) || 
            (w.meaning && w.meaning.toLowerCase().includes(query))
          );
        }
        // 保持当前排序
        sortData(currentSort.field, currentSort.order);
        currentPage = 1;
      }

      function applyFilterAndRender() {
        filterWords();
        renderTable();
        updatePagination();
      }

      // ---------- 渲染表格 ----------
      function renderTable() {
        if (filteredWords.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="5" class="no-results">🔍 没有匹配的单词</td></tr>`;
          wordCountSpan.textContent = '0 个单词';
          return;
        }

        let displayWords;
        if (showAll) {
          displayWords = filteredWords;
        } else {
          const start = (currentPage - 1) * pageSize;
          const end = start + pageSize;
          displayWords = filteredWords.slice(start, end);
        }

        let html = '';
        for (let w of displayWords) {
          const sfiPercent = Math.min(100, Math.max(0, ((w.sfi - 35) / (90 - 35)) * 100));
          const favClass = w.favorite ? 'active' : '';
          html += `
            <tr>
              <td>${w.index}</td>
              <td><strong>${escapeHtml(w.word)}</strong></td>
              <td class="col-meaning">${escapeHtml(w.meaning)}</td>
              <td>
                <div class="sfi-cell">
                  <span>${w.sfi.toFixed(2)}</span>
                  <div class="progress-bar-bg">
                    <div class="progress-fill" style="width: ${sfiPercent}%;"></div>
                  </div>
                </div>
              </td>
              <td class="col-fav">
                <button class="fav-btn ${favClass}" data-word="${escapeHtml(w.word)}">♥</button>
              </td>
            </tr>
          `;
        }
        tableBody.innerHTML = html;

        // 绑定收藏事件
        document.querySelectorAll('.fav-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const word = btn.dataset.word;
            toggleFavorite(word);
          });
        });

        wordCountSpan.textContent = `共 ${filteredWords.length} 个单词`;
      }

      // 简单的转义函数
      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // ---------- 分页控件 ----------
      function updatePagination() {
        if (showAll || filteredWords.length <= pageSize) {
          paginationContainer.innerHTML = '';
          return;
        }
        
        const totalPages = Math.ceil(filteredWords.length / pageSize);
        let html = '';
        html += `<button class="page-btn" data-page="prev" ${currentPage === 1 ? 'disabled' : ''}>‹ 上一页</button>`;
        
        for (let i = 1; i <= totalPages; i++) {
          if (totalPages <= 7 || i === 1 || i === totalPages || (i >= currentPage-1 && i <= currentPage+1)) {
            html += `<button class="page-btn ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</button>`;
          } else if (i === currentPage - 2 || i === currentPage + 2) {
            html += `<span style="padding:0 0.3rem;">…</span>`;
          }
        }
        
        html += `<button class="page-btn" data-page="next" ${currentPage === totalPages ? 'disabled' : ''}>下一页 ›</button>`;
        paginationContainer.innerHTML = html;

        // 绑定分页点击
        paginationContainer.querySelectorAll('.page-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const page = btn.dataset.page;
            if (page === 'prev' && currentPage > 1) {
              currentPage--;
            } else if (page === 'next' && currentPage < totalPages) {
              currentPage++;
            } else if (!isNaN(parseInt(page))) {
              currentPage = parseInt(page);
            }
            renderTable();
            updatePagination();
          });
        });
      }

      // ---------- 视图切换（分页/全部） ----------
      viewToggleBtn.addEventListener('click', () => {
        showAll = !showAll;
        if (showAll) {
          viewToggleBtn.innerHTML = '📋 显示全部';
          currentPage = 1;
        } else {
          viewToggleBtn.innerHTML = '📄 分页显示';
          currentPage = 1;
        }
        renderTable();
        updatePagination();
      });

      // ---------- 主题切换 ----------
      function applyTheme(theme) {
        if (theme === 'dark') {
          document.body.classList.add('dark');
          themeToggle.innerHTML = '☀️ 浅色';
        } else {
          document.body.classList.remove('dark');
          themeToggle.innerHTML = '🌙 深色';
        }
      }

      function toggleTheme() {
        const isDark = document.body.classList.contains('dark');
        const newTheme = isDark ? 'light' : 'dark';
        localStorage.setItem('ngsl_theme', newTheme);
        applyTheme(newTheme);
      }

      themeToggle.addEventListener('click', toggleTheme);

      // 初始化主题
      const savedTheme = localStorage.getItem('ngsl_theme') || 'light';
      applyTheme(savedTheme);

      // ---------- 键盘快捷键 ----------
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
        }
      });

      // 搜索输入监听
      searchInput.addEventListener('input', () => {
        applyFilterAndRender();
      });

      // 启动加载
      loadData();
    })();
  </script>
</body>
</html>
