<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGSL 词汇表 · 词典查询</title>
    <style>
        :root {
            --bg: #faf7f1;
            --surface: #fffdf8;
            --surface-hover: #f5efdf;
            --text: #2b2b2b;
            --text-light: #666;
            --primary: #1f6f5c;
            --primary-light: #e6f2ee;
            --accent: #c98a2b;
            --border: #e0d8c8;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 8px;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --surface: #252525;
            --surface-hover: #303030;
            --text: #e0e0e0;
            --text-light: #999;
            --primary: #3eb094;
            --primary-light: #2a3f38;
            --accent: #e0a84b;
            --border: #333;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--primary);
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 700;
        }

        h1 span {
            color: var(--accent);
            font-size: 0.6em;
            font-weight: normal;
            margin-left: 8px;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"], select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: var(--surface);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: clamp(180px, 30vw, 300px);
            padding-left: 36px;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .btn-icon, .btn-text {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--text);
            padding: 8px 12px;
        }

        .btn-icon {
            width: 38px;
            height: 38px;
            font-size: 1.1rem;
        }

        .btn-icon:hover, .btn-text:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .table-container {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        thead th {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        [data-theme="dark"] thead th {
            background-color: var(--surface);
            border-bottom: 2px solid var(--primary);
        }

        thead th:hover {
            background-color: var(--primary);
            color: #fff;
        }

        tbody tr {
            transition: background-color 0.1s;
            cursor: pointer;
        }

        tbody tr:hover {
            background-color: var(--surface-hover);
        }

        .word-cell {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.05rem;
        }

        .forms-cell {
            color: var(--text-light);
            font-size: 0.85rem;
            font-style: italic;
        }

        .sfi-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sfi-track {
            width: 60px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .sfi-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
        }

        .sfi-val {
            font-size: 0.85rem;
            color: var(--text-light);
            width: 36px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.1s;
            color: var(--text-light);
        }

        .action-btn:hover {
            transform: scale(1.2);
        }

        .fav-active {
            color: #e74c3c;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            line-height: 1;
        }

        .modal h2 {
            font-family: Georgia, serif;
            color: var(--primary);
            margin-bottom: 4px;
            font-size: 2rem;
        }

        .phonetic {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 24px;
            font-style: italic;
        }

        .dict-section {
            margin-bottom: 20px;
            border-left: 3px solid var(--primary);
            padding-left: 16px;
        }

        .pos {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: italic;
            margin-bottom: 8px;
        }

        .definition {
            margin-bottom: 8px;
            padding-left: 12px;
            position: relative;
        }

        .definition::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        .example {
            font-size: 0.9rem;
            color: var(--text-light);
            font-style: italic;
            margin-top: 4px;
            padding-left: 12px;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .loader div {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            text-align: center;
            color: #e74c3c;
            padding: 20px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state h2 {
            color: var(--text);
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .container { padding: 12px; }
            .modal { padding: 24px 20px; }
            th, td { padding: 8px 10px; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>
    <input type="file" id="fileInput" accept=".txt,.csv,.json" style="display: none;">

    <div class="container">
        <header>
            <h1>NGSL 词汇表 <span>词典查询</span></h1>
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索单词或词形...">
                </div>
                <select id="sortSelect">
                    <option value="n">按频率排序</option>
                    <option value="word">按字母排序</option>
                </select>
                <button class="btn-text" id="loadDataBtn" title="导入数据文件">📁 导入数据</button>
                <button class="btn-icon" id="themeToggle" title="切换主题">🌙</button>
            </div>
        </header>

        <main>
            <div class="table-container">
                <div class="empty-state" id="emptyState">
                    <h2>暂无数据</h2>
                    <p>请点击右上角“导入数据”按钮，选择 Excel 另存为的 CSV/TXT 文件。</p>
                </div>
                <table id="dataTable" style="display: none;">
                    <thead>
                        <tr>
                            <th data-sort="n" style="width: 60px;">#</th>
                            <th data-sort="word">单词</th>
                            <th class="hide-mobile">相关词形</th>
                            <th data-sort="sfi" style="width: 140px;">SFI 词频</th>
                            <th class="hide-mobile" style="width: 80px;">收藏</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </main>

        <footer>
            <p>数据来源: NGSL Word List · 词典 API: dictionaryapi.dev</p>
        </footer>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <button class="modal-close" id="modalClose">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ================= 配置区 =================
        const CONFIG = {
            dictionary: {
                baseUrl: "https://api.dictionaryapi.dev/api/v2/entries/en/",
                queryParams: {
                    simple: true // 开启简化释义
                },
                apiKey: "",       // 如需使用带 key 的 API，填入此处
                apiKeyParam: "key" // key 作为哪个 query 参数名传
            },
            page: {
                size: 50 // 每页显示条数
            }
        };

        let ALL_WORDS = []; // 将从文件加载
        let filteredWords = [];
        let currentPage = 1;
        let sortBy = 'n';
        let favorites = JSON.parse(localStorage.getItem('ngsl_favs') || '{}');

        // ================= DOM 元素 =================
        const tableBody = document.getElementById('tableBody');
        const pagination = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');
        const fileInput = document.getElementById('fileInput');
        const loadDataBtn = document.getElementById('loadDataBtn');
        const emptyState = document.getElementById('emptyState');
        const dataTable = document.getElementById('dataTable');

        // ================= 数据解析与加载 =================
        function parseTextData(text) {
            const lines = text.trim().split(/\r?\n/);
            const result = [];
            for (let line of lines) {
                if (!line || line.startsWith('Number') || line.startsWith('sheet_')) continue;
                // 兼容 Tab 分隔和逗号分隔
                const parts = line.includes('\t') ? line.split('\t') : line.split(',');
                const cleanParts = parts.map(p => p.trim()).filter(p => p !== '');
                
                if (cleanParts.length >= 4) {
                    let n, word, forms, sfi, u;
                    // 处理只有4列的情况（无词形）
                    if (cleanParts.length === 4) {
                        [n, word, sfi, u] = cleanParts;
                        forms = '';
                    } else {
                        [n, word, forms, sfi, u] = cleanParts;
                    }
                    
                    // 过滤掉表头残留
                    if (isNaN(parseFloat(sfi))) continue; 

                    result.push({
                        n: parseInt(n) || result.length + 1,
                        word: word,
                        forms: forms,
                        sfi: parseFloat(sfi),
                        u: parseInt(u)
                    });
                }
            }
            return result;
        }

        function loadDataFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                ALL_WORDS = parseTextData(text);
                if (ALL_WORDS.length > 0) {
                    emptyState.style.display = 'none';
                    dataTable.style.display = 'table';
                    filterAndSort();
                } else {
                    alert("未能解析到数据，请检查文件格式。");
                }
            };
            reader.readAsText(file);
        }

        // ================= 渲染逻辑 =================
        function renderTable() {
            const start = (currentPage - 1) * CONFIG.page.size;
            const end = start + CONFIG.page.size;
            const pageData = filteredWords.slice(start, end);

            tableBody.innerHTML = pageData.map(item => {
                const sfiWidth = Math.max(10, (item.sfi - 40) * 2.5);
                const isFav = favorites[item.word] ? 'fav-active' : '';
                return `
                    <tr onclick="fetchDictionary('${item.word}')">
                        <td>${item.n}</td>
                        <td class="word-cell">${item.word}</td>
                        <td class="forms-cell hide-mobile">${item.forms}</td>
                        <td>
                            <div class="sfi-bar">
                                <div class="sfi-track">
                                    <div class="sfi-fill" style="width: ${sfiWidth}%;"></div>
                                </div>
                                <span class="sfi-val">${item.sfi}</span>
                            </div>
                        </td>
                        <td class="hide-mobile" onclick="event.stopPropagation()">
                            <button class="action-btn ${isFav}" onclick="toggleFav('${item.word}', this)">♥</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredWords.length / CONFIG.page.size);
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            
            const maxPagesToShow = 7;
            let startPage = Math.max(1, currentPage - 3);
            let endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);
            
            if (endPage - startPage + 1 < maxPagesToShow) {
                startPage = Math.max(1, endPage - maxPagesToShow + 1);
            }

            if (startPage > 1) {
                html += `<button class="page-btn" onclick="changePage(1)">1</button>`;
                if (startPage > 2) html += `<span>...</span>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span>...</span>`;
                html += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
            }

            html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredWords.length / CONFIG.page.size);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterAndSort() {
            if (ALL_WORDS.length === 0) return;
            
            const query = searchInput.value.toLowerCase().trim();
            filteredWords = ALL_WORDS.filter(item => {
                if (!query) return true;
                if (item.word.toLowerCase().includes(query)) return true;
                if (item.forms.toLowerCase().includes(query)) return true;
                return false;
            });

            if (sortBy === 'n') {
                filteredWords.sort((a, b) => a.n - b.n);
            } else if (sortBy === 'word') {
                filteredWords.sort((a, b) => a.word.localeCompare(b.word));
            } else if (sortBy === 'sfi') {
                filteredWords.sort((a, b) => b.sfi - a.sfi);
            }

            currentPage = 1;
            renderTable();
            renderPagination();
        }

        // ================= 词典 API 调用 =================
        async function fetchDictionary(word) {
            if (!word) return;
            modalOverlay.classList.add('active');
            modalBody.innerHTML = `<div class="loader"><div></div>正在查询 "${word}"...</div>`;

            try {
                const url = new URL(CONFIG.dictionary.baseUrl + encodeURIComponent(word));
                for (const [k, v] of Object.entries(CONFIG.dictionary.queryParams)) {
                    url.searchParams.set(k, v);
                }
                if (CONFIG.dictionary.apiKey) {
                    url.searchParams.set(CONFIG.dictionary.apiKeyParam, CONFIG.dictionary.apiKey);
                }

                const response = await fetch(url.toString());
                if (!response.ok) {
                    throw new Error('未找到该单词的释义');
                }
                
                const data = await response.json();
                renderDictionaryModal(word, data);
            } catch (error) {
                modalBody.innerHTML = `
                    <h2>${word}</h2>
                    <div class="error-msg">
                        <p>❌ ${error.message}</p>
                    </div>
                `;
            }
        }

        function renderDictionaryModal(word, data) {
            let html = `<h2>${word}</h2>`;
            
            const firstEntry = data[0];
            if (firstEntry.phonetic) {
                html += `<div class="phonetic">${firstEntry.phonetic}</div>`;
            } else if (firstEntry.phonetics && firstEntry.phonetics.length > 0) {
                const ph = firstEntry.phonetics.find(p => p.text) || firstEntry.phonetics[0];
                if (ph && ph.text) html += `<div class="phonetic">${ph.text}</div>`;
            }

            data.forEach(entry => {
                if (entry.meanings && entry.meanings.length > 0) {
                    entry.meanings.forEach(meaning => {
                        html += `<div class="dict-section">
                            <div class="pos">${meaning.partOfSpeech}</div>`;
                        
                        meaning.definitions.slice(0, 4).forEach(def => {
                            html += `<div class="definition">${def.definition}</div>`;
                            if (def.example) {
                                html += `<div class="example">"${def.example}"</div>`;
                            }
                        });
                        
                        html += `</div>`;
                    });
                }
            });

            modalBody.innerHTML = html;
        }

        // ================= 交互事件 =================
        function toggleFav(word, btn) {
            if (favorites[word]) {
                delete favorites[word];
                btn.classList.remove('fav-active');
            } else {
                favorites[word] = true;
                btn.classList.add('fav-active');
            }
            localStorage.setItem('ngsl_favs', JSON.stringify(favorites));
        }

        // 搜索防抖
        let searchTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(filterAndSort, 300);
        });

        // 排序绑定
        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                sortBy = th.dataset.sort;
                sortSelect.value = sortBy;
                filterAndSort();
            });
        });

        sortSelect.addEventListener('change', (e) => {
            sortBy = e.target.value;
            filterAndSort();
        });

        // Modal 关闭
        modalClose.addEventListener('click', () => modalOverlay.classList.remove('active'));
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('active');
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') modalOverlay.classList.remove('active');
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // 文件导入按钮
        loadDataBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadDataFile(file);
        });

        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('ngsl_theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
                localStorage.setItem('ngsl_theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
                localStorage.setItem('ngsl_theme', 'dark');
            }
        });

        // 初始化尝试自动加载本地 data.txt
        async function autoLoad() {
            try {
                const response = await fetch('data.txt');
                if (response.ok) {
                    const text = await response.text();
                    ALL_WORDS = parseTextData(text);
                    if (ALL_WORDS.length > 0) {
                        emptyState.style.display = 'none';
                        dataTable.style.display = 'table';
                        filterAndSort();
                    }
                }
            } catch (e) {
                console.log("自动加载本地文件失败，请点击按钮手动导入。");
            }
        }
        autoLoad();
