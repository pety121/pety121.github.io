<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGSL 词汇表查询</title>
    <style>
        :root {
            --bg-color: #fdf6ec;
            --header-bg: #e8f5e9;
            --text-color: #333;
            --primary-color: #2d5a27;
            --border-color: #ddd;
            --hover-bg: #f1f8e9;
            --modal-bg: rgba(0, 0, 0, 0.5);
            --card-bg: #fff;
            --marked-color: #d32f2f;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1e1e1e;
            --header-bg: #2c2c2c;
            --text-color: #e0e0e0;
            --primary-color: #4db6ac;
            --border-color: #444;
            --hover-bg: #373737;
            --modal-bg: rgba(0, 0, 0, 0.7);
            --card-bg: #2c2c2c;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding-bottom: 50px; }

        /* Loading */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; color: var(--primary-color); }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--primary-color); animation: spin 1s linear infinite; margin-right: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Top Bar */
        .top-bar { position: sticky; top: 0; z-index: 100; background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; box-shadow: var(--shadow); }
        .bar-left, .bar-right { display: flex; align-items: center; gap: 10px; }
        .bar-center { flex-grow: 1; max-width: 400px; margin: 0 10px; }
        
        button { cursor: pointer; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); padding: 6px 12px; border-radius: 4px; font-size: 14px; }
        button:hover:not(:disabled) { background-color: var(--hover-bg); border-color: var(--primary-color); }
        button.active { background-color: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        input[type="text"] { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; background: var(--bg-color); color: var(--text-color); }
        input[type="text"]:focus { border-color: var(--primary-color); }

        /* Table */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 10px; }
        .status-msg { text-align: center; color: #f57c00; margin-bottom: 10px; display: none; }
        .table-wrapper { overflow-x: auto; border: 1px solid var(--border-color); border-radius: 4px; background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 600px; }
        th, td { border: 1px solid var(--border-color); padding: 8px 10px; text-align: left; overflow: hidden; }
        th { background-color: var(--header-bg); font-weight: 600; position: sticky; top: 0; z-index: 10; user-select: none; }
        tr:hover { background-color: var(--hover-bg); }
        
        .col-id { width: 80px; }
        .col-word { width: 150px; font-weight: bold; cursor: pointer; }
        .col-word:hover { text-decoration: underline; color: var(--primary-color); }
        .col-form { /* auto width */ white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: help; color: #666; }
        [data-theme="dark"] .col-form { color: #aaa; }
        .col-action { width: 70px; text-align: center; }

        .mark-btn { display: inline-block; width: 24px; height: 24px; border: 2px solid #999; border-radius: 50%; cursor: pointer; position: relative; background: transparent; padding: 0; }
        .mark-btn.marked { background-color: var(--marked-color); border-color: var(--marked-color); }
        .mark-btn.marked::after { content: '✓'; color: #fff; font-size: 16px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; margin-top: 20px; gap: 10px; }
        .page-info { font-size: 14px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); z-index: 200; justify-content: center; align-items: center; }
        .modal.open { display: flex; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 8px; max-width: 500px; width: 90%; box-shadow: var(--shadow); position: relative; max-height: 80vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 20px; color: #999; }
        .modal-close:hover { color: var(--marked-color); }
        .modal-body { margin-top: 10px; word-wrap: break-word; }

        /* Responsive */
        @media (max-width: 600px) {
            .col-id { width: 50px; }
            .col-word { width: 80px; }
            .col-action { width: 50px; }
            .top-bar { justify-content: center; }
            .bar-center { width: 100%; max-width: none; margin: 10px 0; }
            .bar-left, .bar-right { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <span>加载中...</span>
    </div>

    <header class="top-bar">
        <div class="bar-left">
            <button id="btn-paginate" class="active">分页</button>
            <button id="btn-unpaginate">不分页</button>
        </div>
        <div class="bar-center">
            <input type="text" id="search-input" placeholder="搜索单词或词形...">
        </div>
        <div class="bar-right">
            <button id="btn-export">导出生词</button>
            <button id="btn-theme">☀️ / 🌙</button>
        </div>
    </header>

    <main class="container">
        <div id="status-msg" class="status-msg">已加载内置示例数据</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="col-id" data-sort="id">序号 <span id="sort-id"></span></th>
                        <th class="col-word" data-sort="word">单词 <span id="sort-word"></span></th>
                        <th class="col-form">相关词形</th>
                        <th class="col-action">操作</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data rows will be inserted here -->
                </tbody>
            </table>
        </div>
        <div id="pagination" class="pagination">
            <button id="prev-page">上一页</button>
            <span class="page-info">第 <span id="curr-page">1</span> 页 / 共 <span id="total-page">1</span> 页</span>
            <button id="next-page">下一页</button>
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="hideModal()">&times;</span>
            <h3>词形详情</h3>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script>
        // --- Constants & Config ---
        const DATAFILE = "data.csv";
        const ITEMS_PER_PAGE = 20;
        const STORAGE_KEY_MARKS = "ngsl_marks";
        const STORAGE_KEY_THEME = "ngsl_theme";
        const STORAGE_KEY_PAGINATION = "ngsl_pagination_mode";

        // --- State ---
        let allData = [];
        let displayData = [];
        let markedWords = new Set();
        let isPagination = true;
        let currentPage = 1;
        let sortCol = 'id';
        let sortAsc = true;
        let isDarkMode = false;

        // --- DOM Elements ---
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusMsg = document.getElementById('status-msg');
        const tableBody = document.getElementById('table-body');
        const searchInput = document.getElementById('search-input');
        const btnPaginate = document.getElementById('btn-paginate');
        const btnUnpaginate = document.getElementById('btn-unpaginate');
        const paginationDiv = document.getElementById('pagination');
        const btnPrev = document.getElementById('prev-page');
        const btnNext = document.getElementById('next-page');
        const spanCurrPage = document.getElementById('curr-page');
        const spanTotalPage = document.getElementById('total-page');
        const btnExport = document.getElementById('btn-export');
        const btnTheme = document.getElementById('btn-theme');
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');
        const thId = document.querySelector('th[data-sort="id"]');
        const thWord = document.querySelector('th[data-sort="word"]');

        // --- Initialization ---
        async function init() {
            showLoading();
            try {
                loadSettings();
                markedWords = loadMarks();
                allData = await loadData();
                // 如果数据为空，已经在 loadData 里处理了降级数据
                applySort(); 
                applySearch(); // 初始渲染
            } catch (e) {
                console.error("Critical Init Error:", e);
                allData = []; // Fallback safety
                applySearch();
            } finally {
                hideLoading();
            }
        }

        // --- Data Loading & Parsing ---
        async function loadData() {
            try {
                const response = await fetch(DATAFILE);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const text = await response.text();
                return parseCSV(text);
            } catch (e) {
                console.warn("Fetch failed or parsing failed, loading fallback data.", e);
                statusMsg.style.display = 'block';
                return getFallbackData();
            }
        }

        function getFallbackData() {
            // 生成不少于30条的示例数据
            const data = [];
            for (let i = 1; i <= 35; i++) {
                data.push({
                    id: i,
                    word: `example${i}`,
                    forms: i % 3 === 0 ? `ex${i}, ex${i}s, ex${i}ing` : '',
                    sfi: 60 + Math.floor(Math.random() * 10),
                    freq: (Math.random() * 10).toFixed(2)
                });
            }
            return data;
        }

        // RFC4180 Compliant CSV Parser State Machine
        function parseCSV(text) {
            const result = [];
            let row = [];
            let currentField = '';
            let inQuotes = false;
            let i = 0;
            const len = text.length;

            while (i < len) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i += 2; // Skip escaped quote
                        continue;
                    } else {
                        inQuotes = !inQuotes;
                        i++;
                        continue;
                    }
                }

                if (inQuotes) {
                    currentField += char;
                    i++;
                    continue;
                }

                if (char === ',') {
                    row.push(currentField.trim());
                    currentField = '';
                    i++;
                    continue;
                }

                if (char === '\r' && nextChar === '\n') {
                    row.push(currentField.trim());
                    if (row.some(f => f.length > 0)) processRow(row);
                    row = [];
                    currentField = '';
                    i += 2;
                    continue;
                }

                if (char === '\n' || char === '\r') {
                    row.push(currentField.trim());
                    if (row.some(f => f.length > 0)) processRow(row);
                    row = [];
                    currentField = '';
                    i++;
                    continue;
                }

                currentField += char;
                i++;
            }

            // Last line if no newline at EOF
            if (currentField || row.length > 0) {
                row.push(currentField.trim());
                if (row.some(f => f.length > 0)) processRow(row);
            }

            function processRow(rawRow) {
                try {
                    if (rawRow.length < 2) return; // 忽略无效行
                    
                    // 清理引号 (去除首尾引号，并将内部 "" 恢复为 ")
                    const cleanRow = rawRow.map(field => {
                        if (field.startsWith('"') && field.endsWith('"')) {
                            return field.slice(1, -1).replace(/""/g, '"');
                        }
                        return field;
                    });

                    let id, word, forms, sfi, freq;

                    // 兼容性处理：5列或4列
                    if (cleanRow.length === 5) {
                        id = cleanRow[0];
                        word = cleanRow[1];
                        forms = cleanRow[2];
                        sfi = cleanRow[3];
                        freq = cleanRow[4];
                    } else if (cleanRow.length === 4) {
                        id = cleanRow[0];
                        word = cleanRow[1];
                        forms = "";
                        sfi = cleanRow[2];
                        freq = cleanRow[3];
                    } else {
                        console.warn("Skipped row due to column count mismatch:", cleanRow);
                        return;
                    }

                    // SFI 检查
                    const sfiNum = Number(sfi);
                    if (isNaN(sfiNum)) {
                        console.warn("Invalid SFI for word:", word, "defaulting to 0");
                    }

                    result.push({
                        id: id,
                        word: word,
                        forms: forms,
                        sfi: isNaN(sfiNum) ? 0 : sfiNum,
                        freq: freq
                    });

                } catch (e) {
                    console.warn("Error processing row:", rawRow, e);
                }
            }

            return result;
        }

        // --- Rendering & Logic ---
        function renderTable() {
            tableBody.innerHTML = '';
            
            let start = 0;
            let end = displayData.length;

            if (isPagination) {
                start = (currentPage - 1) * ITEMS_PER_PAGE;
                end = Math.min(start + ITEMS_PER_PAGE, displayData.length);
            }

            const fragment = document.createDocumentFragment();

            for (let i = start; i < end; i++) {
                const item = displayData[i];
                const tr = document.createElement('tr');
                
                // Mark Status
                const isMarked = markedWords.has(item.word);
                
                tr.innerHTML = `
                    <td class="col-id">${item.id}</td>
                    <td class="col-word" onclick="handleWordClick('${escapeHtml(item.word)}')">${escapeHtml(item.word)}</td>
                    <td class="col-form" onclick="showModal('${escapeHtml(item.forms)}')" title="点击查看详情">${escapeHtml(item.forms)}</td>
                    <td class="col-action">
                        <div class="mark-btn ${isMarked ? 'marked' : ''}" onclick="toggleMarkWord('${escapeHtml(item.word)}', this)"></div>
                    </td>
                `;
                fragment.appendChild(tr);
            }
            tableBody.appendChild(fragment);
            renderPagination();
        }

        function renderPagination() {
            if (!isPagination) {
                paginationDiv.style.display = 'none';
                return;
            }
            paginationDiv.style.display = 'flex';
            const totalPages = Math.ceil(displayData.length / ITEMS_PER_PAGE) || 1;
            
            // 边界检查
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            spanCurrPage.textContent = currentPage;
            spanTotalPage.textContent = totalPages;

            btnPrev.disabled = currentPage === 1;
            btnNext.disabled = currentPage === totalPages;
        }

        function applySearch() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) {
                displayData = [...allData];
                // 恢复分页偏好（如果搜索时自动切换为了不分页）
                const savedMode = localStorage.getItem(STORAGE_KEY_PAGINATION);
                if (savedMode === 'paginate') {
                    isPagination = true;
                    updatePaginationButtons();
                }
            } else {
                // 搜索时自动不分页
                isPagination = false;
                updatePaginationButtons();
                
                displayData = allData.filter(item => {
                    return item.word.toLowerCase().includes(query) || 
                           item.forms.toLowerCase().includes(query);
                });
            }
            // 搜索或重置后，重新应用排序并回到第一页
            sortData(); 
            currentPage = 1;
            renderTable();
        }

        function applySort() {
            sortData();
            currentPage = 1;
            renderTable();
        }

        function sortData() {
            displayData.sort((a, b) => {
                let valA = a[sortCol];
                let valB = b[sortCol];

                // 尝试数字比较
                if (sortCol === 'id') {
                    valA = parseInt(valA, 10) || 0;
                    valB = parseInt(valB, 10) || 0;
                } else {
                    valA = valA.toString().toLowerCase();
                    valB = valB.toString().toLowerCase();
                }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
            updateSortIcons();
        }

        function updateSortIcons() {
            const idSpan = document.getElementById('sort-id');
            const wordSpan = document.getElementById('sort-word');
            
            const reset = (el) => el.textContent = '';
            const set = (el, asc) => el.textContent = asc ? ' ↑' : ' ↓';

            reset(idSpan);
            reset(wordSpan);

            if (sortCol === 'id') set(idSpan, sortAsc);
            if (sortCol === 'word') set(wordSpan, sortAsc);
        }

        // --- Interaction Handlers ---
        
        // Reserved interface
        function handleWordClick(word) {
            // Reserved for future expansion
        }

        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applySearch, 300);
        });

        // Pagination Switch
        btnPaginate.addEventListener('click', () => {
            isPagination = true;
            localStorage.setItem(STORAGE_KEY_PAGINATION, 'paginate');
            updatePaginationButtons();
            currentPage = 1;
            renderTable();
        });

        btnUnpaginate.addEventListener('click', () => {
            isPagination = false;
            localStorage.setItem(STORAGE_KEY_PAGINATION, 'unpaginate');
            updatePaginationButtons();
            renderTable();
        });

        function updatePaginationButtons() {
            if (isPagination) {
                btnPaginate.classList.add('active');
                btnUnpaginate.classList.remove('active');
            } else {
                btnPaginate.classList.remove('active');
                btnUnpaginate.classList.add('active');
            }
        }

        // Page Nav
        btnPrev.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        });

        btnNext.addEventListener('click', () => {
            const totalPages = Math.ceil(displayData.length / ITEMS_PER_PAGE);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        });

        // Sorting
        thId.addEventListener('click', () => {
            if (sortCol === 'id') sortAsc = !sortAsc;
            else { sortCol = 'id'; sortAsc = true; }
            applySort();
        });

        thWord.addEventListener('click', () => {
            if (sortCol === 'word') sortAsc = !sortAsc;
            else { sortCol = 'word'; sortAsc = true; }
            applySort();
        });

        // Marking Words
        function toggleMarkWord(word, btnElement) {
            if (markedWords.has(word)) {
                markedWords.delete(word);
                btnElement.classList.remove('marked');
            } else {
                markedWords.add(word);
                btnElement.classList.add('marked');
            }
            saveMarks(markedWords);
        }

        function loadMarks() {
            try {
                const str = localStorage.getItem(STORAGE_KEY_MARKS);
                return str ? new Set(JSON.parse(str)) : new Set();
            } catch (e) {
                console.error("Failed to load marks", e);
                return new Set();
            }
        }

        function saveMarks(set) {
            try {
                localStorage.setItem(STORAGE_KEY_MARKS, JSON.stringify([...set]));
            } catch (e) {
                console.error("Failed to save marks", e);
            }
        }

        // Export
        btnExport.addEventListener('click', exportWords);

        function exportWords() {
            if (markedWords.size === 0) {
                showToast("无已标记的生词");
                return;
            }

            let csvContent = "\uFEFF序号,单词,相关词形\n"; // Add BOM for Excel
            markedWords.forEach(word => {
                const item = allData.find(d => d.word === word);
                if (item) {
                    // Escape commas in fields to keep CSV valid
                    const safeWord = item.word.includes(',') ? `"${item.word}"` : item.word;
                    const safeForms = item.forms.includes(',') ? `"${item.forms}"` : item.forms;
                    csvContent += `${item.id},${safeWord},${safeForms}\n`;
                }
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "ngsl_marked_words.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.style.cssText = `
                position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
                border-radius: 4px; z-index: 1000; font-size: 14px; opacity: 0;
                transition: opacity 0.3s;
            `;
            document.body.appendChild(toast);
            // Force reflow
            void toast.offsetWidth;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // Theme Toggle
        function loadSettings() {
            const theme = localStorage.getItem(STORAGE_KEY_THEME);
            const pagMode = localStorage.getItem(STORAGE_KEY_PAGINATION);
            
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                isDarkMode = true;
            }
            
            if (pagMode === 'unpaginate') {
                isPagination = false;
            } else {
                isPagination = true;
            }
            updatePaginationButtons();
        }

        btnTheme.addEventListener('click', toggleTheme);

        function toggleTheme() {
            if (isDarkMode) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem(STORAGE_KEY_THEME, 'light');
                isDarkMode = false;
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem(STORAGE_KEY_THEME, 'dark');
                isDarkMode = true;
            }
        }

        // Modal
        function showModal(content) {
            if (!content) return;
            modalBody.textContent = content;
            modal.classList.add('open');
        }

        function hideModal() {
            modal.classList.remove('open');
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) hideModal();
        });

        // Utils
        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showLoading() {
            loadingOverlay.style.display = 'flex';
        }

        function hideLoading() {
            loadingOverlay.style.display = 'none';
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape') {
                hideModal();
            }
        });

        // Start
        init();

    </script>
</body>
</html>
