<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGSL 词汇查询</title>
<style>
  :root {
    --bg-color: #fdfbf7;
    --text-color: #2c3e2e;
    --header-bg: #f4f0e6;
    --border-color: #dcd7c8;
    --primary-color: #2e7d32;
    --hover-bg: #eef5e9;
    --even-row-bg: #faf8f2;
    --placeholder-color: #8c8c8c;
    --modal-bg: #ffffff;
    --shadow: 0 2px 8px rgba(0,0,0,0.1);
    --font-size: 14px;
  }

  [data-theme="dark"] {
    --bg-color: #1e1e1e;
    --text-color: #d4d4d4;
    --header-bg: #2a2a2a;
    --border-color: #3c3c3c;
    --primary-color: #4db6ac;
    --hover-bg: #333333;
    --even-row-bg: #252525;
    --placeholder-color: #666666;
    --modal-bg: #2a2a2a;
    --shadow: 0 4px 12px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    font-size: var(--font-size);
    line-height: 1.5;
  }

  /* 常驻顶部状态栏 */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--header-bg);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    gap: 15px;
  }

  .left-controls, .right-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  
  .search-container {
    flex-grow: 1;
    max-width: 450px;
    margin: 0 auto;
  }

  .search-input {
    width: 100%;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    background-color: var(--bg-color);
    color: var(--text-color);
    font-size: var(--font-size);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 2px rgba(46, 125, 50, 0.1);
  }

  .theme-btn {
    background: none;
    border: 1px solid var(--border-color);
    border-radius: 50%;
    width: 34px;
    height: 34px;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-color);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  
  .theme-btn:hover {
    background: var(--hover-bg);
  }

  /* 分页/不分页按钮组 */
  .segmented-control {
    display: flex;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    overflow: hidden;
  }

  .segmented-control button {
    background: none;
    border: none;
    padding: 7px 16px;
    cursor: pointer;
    color: var(--text-color);
    font-size: 13px;
    transition: background 0.2s, color 0.2s;
  }

  .segmented-control button.active {
    background-color: var(--primary-color);
    color: #fff;
  }

  .table-container {
    width: 100%;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed; /* 严格固定列宽 */
  }

  th, td {
    padding: 8px 10px;
    text-align: left;
    border: 1px solid var(--border-color); /* Excel 式内部网格线 */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: middle;
  }

  th {
    background-color: var(--header-bg);
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 55px; /* 紧贴常驻状态栏下方 */
    z-index: 10;
  }
  
  th:hover {
    background-color: var(--hover-bg);
  }

  tbody tr:nth-child(even) {
    background-color: var(--even-row-bg);
  }
  
  tbody tr:hover {
    background-color: var(--hover-bg);
  }

  /* 各列严格宽度分配 */
  th:nth-child(1), td:nth-child(1) { width: 50px; text-align: center; }
  th:nth-child(2), td:nth-child(2) { width: 150px; }
  th:nth-child(3), td:nth-child(3) { width: auto; cursor: pointer; } /* 占据剩余空间 */
  th:nth-child(4), td:nth-child(4) { width: 100px; }
  th:nth-child(5), td:nth-child(5) { width: 50px; text-align: center; }

  .word-cell { cursor: pointer; color: var(--primary-color); font-weight: 500; }
  .forms-cell { color: var(--text-color); }
  
  /* SFI 进度条 */
  .sfi-bar-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sfi-track {
    width: 50px;
    height: 6px;
    background-color: var(--border-color);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sfi-fill {
    height: 100%;
    background-color: var(--primary-color);
    border-radius: 3px;
  }
  .sfi-num { font-size: 12px; min-width: 35px; }

  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--border-color);
    transition: color 0.2s, transform 0.2s;
  }
  .fav-btn:hover { transform: scale(1.2); }
  .fav-btn.fav-active { color: #e53935; }

  /* 弹窗 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    background-color: var(--modal-bg);
    padding: 24px;
    border-radius: 8px;
    max-width: 80%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
    word-wrap: break-word;
    white-space: normal;
    line-height: 1.6;
  }

  /* 分页控件区 */
  .pagination-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    gap: 8px;
    border-top: 1px solid var(--border-color);
  }
  
  .pagination-container button {
    background: none;
    border: 1px solid var(--border-color);
    color: var(--text-color);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
  }
  
  .pagination-container button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  
  .pagination-container button.active {
    background-color: var(--primary-color);
    color: #fff;
  }

  .sort-arrow {
    font-size: 12px;
    margin-left: 4px;
    opacity: 0.7;
  }

  /* 手机端响应式适配 */
  @media (max-width: 600px) {
    .toolbar { 
      flex-wrap: wrap; 
      padding: 8px 10px; 
      gap: 8px;
    }
    .search-container { 
      order: 3; 
      flex-basis: 100%; 
      max-width: 100%; 
    }
    th { top: 105px; } /* 因工具栏换行变高，调整表头吸顶距离 */
    
    th:nth-child(1), td:nth-child(1) { width: 35px; padding: 8px 4px; }
    th:nth-child(2), td:nth-child(2) { width: 80px; }
    th:nth-child(4), td:nth-child(4) { width: 70px; }
    th:nth-child(5), td:nth-child(5) { width: 35px; padding: 8px 4px; }
    
    .sfi-num { display: none; }
    .sfi-track { width: 40px; }
  }
</style>
</head>
<body>

<header class="toolbar">
  <div class="left-controls">
    <button class="theme-btn" id="themeToggle">☀️</button>
  </div>
  
  <div class="search-container">
    <input type="text" class="search-input" id="searchInput" placeholder="搜索单词或词形...">
  </div>
  
  <div class="right-controls">
    <div class="segmented-control">
      <button id="btnPaged" class="active">分页</button>
      <button id="btnAll">不分页</button>
    </div>
  </div>
</header>

<div class="table-container">
  <table id="dataTable">
    <thead>
      <tr>
        <th data-sort="index"># <span class="sort-arrow"></span></th>
        <th data-sort="word">单词 <span class="sort-arrow"></span></th>
        <th data-sort="forms">相关词形 <span class="sort-arrow"></span></th>
        <th data-sort="sfi">SFI词频 <span class="sort-arrow"></span></th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="5" style="text-align: center; padding: 20px;">数据加载中...</td></tr>
    </tbody>
  </table>
</div>

<div class="pagination-container" id="paginationContainer" style="display: none;"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
  let allData = [];
  let filteredData = [];
  let currentPage = 1;
  const pageSize = 50;
  let isPaged = localStorage.getItem('ngsl_isPaged') !== 'false'; // 默认分页
  let sortColumn = 'index';
  let sortDir = 'asc';
  let favorites = JSON.parse(localStorage.getItem('ngsl_favs') || '[]');
  let currentTheme = localStorage.getItem('ngsl_theme') || 'light';

  // DOM 元素绑定
  const tableBody = document.getElementById('tableBody');
  const searchInput = document.getElementById('searchInput');
  const themeToggle = document.getElementById('themeToggle');
  const btnPaged = document.getElementById('btnPaged');
  const btnAll = document.getElementById('btnAll');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalContent = document.getElementById('modalContent');
  const paginationContainer = document.getElementById('paginationContainer');

  // 初始化
  function init() {
    applyTheme();
    applyPagedState();
    loadData();
    bindEvents();
  }

  // 拉取并解析数据
  async function loadData() {
    try {
      const response = await fetch('data.txt');
      if (!response.ok) throw new Error('网络响应异常');
      const text = await response.text();
      const rows = parseCSV(text);
      
      allData = rows.filter(r => r.length >= 4).map((r, i) => {
        return {
          index: parseInt(r[0]) || (i + 1),
          word: (r[1] || '').trim(),
          forms: (r[2] || '').trim(),
          sfi: parseFloat(r[3]) || 0,
          freq: r[4] ? parseInt(r[4].replace(/,/g, '')) : 0 // 兼容有无频率列
        };
      });
      
      filteredData = [...allData];
      renderTable();
    } catch (error) {
      tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px; color:red;">加载 data.txt 失败: ${error.message}<br>请确保文件存在且同级目录。</td></tr>`;
    }
  }

  // 健壮的 CSV 解析器（支持双引号包裹和内部逗号）
  function parseCSV(text) {
    const rows = [];
    let currentRow = [];
    let currentField = '';
    let inQuotes = false;
    
    for (let i = 0; i < text.length; i++) {
      const char = text[i];
      const nextChar = text[i + 1];
      
      if (char === '"' && inQuotes && nextChar === '"') {
        currentField += '"'; // 处理转义的双引号
        i++;
      } else if (char === '"') {
        inQuotes = !inQuotes; // 进出引号，不把引号本身加入字段
      } else if (char === ',' && !inQuotes) {
        currentRow.push(currentField);
        currentField = '';
      } else if ((char === '\n' || char === '\r') && !inQuotes) {
        if (char === '\r' && nextChar === '\n') i++;
        currentRow.push(currentField);
        if (currentRow.some(c => c.trim() !== '')) rows.push(currentRow);
        currentRow = [];
        currentField = '';
      } else {
        currentField += char;
      }
    }
    if (currentField !== '' || currentRow.length > 0) {
      currentRow.push(currentField);
      if (currentRow.some(c => c.trim() !== '')) rows.push(currentRow);
    }
    return rows;
  }

  // 渲染主表格
  function renderTable() {
    if (filteredData.length === 0) {
      tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px;">无匹配结果</td></tr>`;
      paginationContainer.style.display = 'none';
      return;
    }

    if (isPaged) {
      paginationContainer.style.display = 'flex';
      renderPagedData();
    } else {
      paginationContainer.style.display = 'none';
      renderRows(filteredData);
    }
    updateSortArrows();
  }

  function renderPagedData() {
    const totalPages = Math.ceil(filteredData.length / pageSize);
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    
    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;
    const pageData = filteredData.slice(start, end);
    
    renderRows(pageData);
    renderPagination(totalPages);
  }

  function renderRows(data) {
    tableBody.innerHTML = '';
    data.forEach(item => {
      const tr = document.createElement('tr');
      const isFav = favorites.includes(item.word);
      const safeWord = item.word.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      
      tr.innerHTML = `
        <td>${item.index}</td>
        <td class="word-cell" onclick="handleWordClick('${safeWord}')">${item.word}</td>
        <td class="forms-cell" onclick="checkEllipsisAndShowModal(this)">${item.forms}</td>
        <td>
          <div class="sfi-bar-container">
            <div class="sfi-track">
              <div class="sfi-fill" style="width: ${Math.min(Math.max(item.sfi, 0), 100)}%"></div>
            </div>
            <span class="sfi-num">${item.sfi.toFixed(1)}</span>
          </div>
        </td>
        <td>
          <button class="fav-btn ${isFav ? 'fav-active' : ''}" onclick="toggleFav('${safeWord}', this)">♥</button>
        </td>
      `;
      tableBody.appendChild(tr);
    });
  }

  function renderPagination(totalPages) {
    paginationContainer.innerHTML = '';
    
    const prevBtn = document.createElement('button');
    prevBtn.textContent = '上一页';
    prevBtn.disabled = currentPage === 1;
    prevBtn.onclick = () => { currentPage--; renderTable(); };
    paginationContainer.appendChild(prevBtn);
    
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, startPage + 4);
    if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);
    
    for (let i = startPage; i <= endPage; i++) {
      const pageBtn = document.createElement('button');
      pageBtn.textContent = i;
      if (i === currentPage) pageBtn.classList.add('active');
      pageBtn.onclick = () => { currentPage = i; renderTable(); };
      paginationContainer.appendChild(pageBtn);
    }
    
    const nextBtn = document.createElement('button');
    nextBtn.textContent = '下一页';
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.onclick = () => { currentPage++; renderTable(); };
    paginationContainer.appendChild(nextBtn);
    
    const info = document.createElement('span');
    info.style.marginLeft = '10px';
    info.style.color = 'var(--text-color)';
    info.textContent = `${currentPage}/${totalPages} 页 (共${filteredData.length}条)`;
    paginationContainer.appendChild(info);
  }

  function updateSortArrows() {
    document.querySelectorAll('th').forEach(th => {
      const arrow = th.querySelector('.sort-arrow');
      if (!arrow) return;
      if (th.dataset.sort === sortColumn) {
        arrow.textContent = sortDir === 'asc' ? '↑' : '↓';
      } else {
        arrow.textContent = '';
      }
    });
  }

  function sortData(column) {
    if (sortColumn === column) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortColumn = column;
      sortDir = 'asc';
    }
    
    filteredData.sort((a, b) => {
      let valA = a[column];
      let valB = b[column];
      if (typeof valA === 'string') {
        return sortDir === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
      } else {
        return sortDir === 'asc' ? valA - valB : valB - valA;
      }
    });
    
    currentPage = 1;
    renderTable();
  }

  function filterData(query) {
    if (!query) {
      filteredData = [...allData];
    } else {
      const q = query.toLowerCase();
      filteredData = allData.filter(item => 
        item.word.toLowerCase().includes(q) || 
        item.forms.toLowerCase().includes(q)
      );
    }
    currentPage = 1;
    renderTable();
  }

  function toggleFav(word, btn) {
    const index = favorites.indexOf(word);
    if (index > -1) {
      favorites.splice(index, 1);
      btn.classList.remove('fav-active');
    } else {
      favorites.push(word);
      btn.classList.add('fav-active');
    }
    localStorage.setItem('ngsl_favs', JSON.stringify(favorites));
  }

  // 预留：点击单词的后续释义展示逻辑
  function handleWordClick(word) {
    // 未来这里将用于展示从 CSV 读取的自定义释义。
    // 目前无释义数据，暂为空函数。
    console.log('查询单词:', word);
  }

  // 检测文本是否被截断，若是则弹出模态框
  function checkEllipsisAndShowModal(element) {
    if (element.scrollWidth > element.clientWidth) {
      modalContent.textContent = element.textContent;
      modalOverlay.classList.add('active');
    }
  }

  function applyTheme() {
    document.documentElement.setAttribute('data-theme', currentTheme);
    themeToggle.textContent = currentTheme === 'light' ? '☀️' : '🌙';
  }

  function toggleTheme() {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
    localStorage.setItem('ngsl_theme', currentTheme);
    applyTheme();
  }

  function applyPagedState() {
    if (isPaged) {
      btnPaged.classList.add('active');
      btnAll.classList.remove('active');
    } else {
      btnPaged.classList.remove('active');
      btnAll.classList.add('active');
    }
  }

  function togglePagedState(state) {
    isPaged = state;
    localStorage.setItem('ngsl_isPaged', isPaged);
    applyPagedState();
    currentPage = 1;
    renderTable();
  }

  function bindEvents() {
    // 防抖搜索
    searchInput.addEventListener('input', debounce((e) => {
      filterData(e.target.value);
    }, 300));

    themeToggle.addEventListener('click', toggleTheme);
    
    btnPaged.addEventListener('click', () => togglePagedState(true));
    btnAll.addEventListener('click', () => togglePagedState(false));

    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => sortData(th.dataset.sort));
    });

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('active');
    });

    // 快捷键绑定
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
      }
      if (e.key === 'Escape') {
        modalOverlay.classList.remove('active');
      }
    });
  }

  function debounce(func, wait) {
    let timeout;
    return function(...args) {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, args), wait);
    };
  }

  init();
</script>
</body>
</html>
