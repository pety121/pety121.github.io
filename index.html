<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NGSL 词汇表 · 词典查询</title>
    <style>
        /* ===== 全局变量 ===== */
        :root {
            --bg: #faf7f1;
            --surface: #fffdf8;
            --surface-hover: #f5efdf;
            --text: #2b2b2b;
            --text-light: #666;
            --primary: #1f6f5c;
            --primary-light: #e6f2ee;
            --accent: #c98a2b;
            --border: #e0d8c8;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius: 8px;
            --font: system-ui, -apple-system, sans-serif;
            --font-serif: Georgia, 'Times New Roman', serif;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --surface: #252525;
            --surface-hover: #303030;
            --text: #e0e0e0;
            --text-light: #999;
            --primary: #3eb094;
            --primary-light: #2a3f38;
            --accent: #e0a84b;
            --border: #333;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        /* ===== 重置 & 基础 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== 头部 ===== */
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 14px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-family: var(--font-serif);
            color: var(--primary);
            font-size: clamp(1.4rem, 3.8vw, 2.1rem);
            font-weight: 700;
        }

        h1 span {
            color: var(--accent);
            font-size: 0.6em;
            font-weight: normal;
            margin-left: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"],
        select {
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: var(--surface);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--primary);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: clamp(160px, 28vw, 280px);
            padding-left: 34px;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .btn-icon,
        .btn-text {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--text);
            padding: 7px 14px;
            gap: 4px;
            white-space: nowrap;
        }

        .btn-icon {
            width: 38px;
            height: 38px;
            font-size: 1.1rem;
            padding: 0;
        }

        .btn-icon:hover,
        .btn-text:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            padding: 6px 14px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-light);
            min-height: 44px;
        }

        .status-bar .count {
            font-weight: 600;
            color: var(--text);
        }

        .status-bar .hint {
            font-size: 0.85rem;
        }

        .status-bar .hint kbd {
            background: var(--border);
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-family: inherit;
        }

        /* ===== 表格容器 ===== */
        .table-container {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        th,
        td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        thead th {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 10;
            transition: background 0.15s, color 0.15s;
        }

        [data-theme="dark"] thead th {
            background-color: var(--surface);
            border-bottom: 2px solid var(--primary);
        }

        thead th:hover {
            background-color: var(--primary);
            color: #fff;
        }

        tbody tr {
            transition: background-color 0.1s;
            cursor: pointer;
        }

        tbody tr:hover {
            background-color: var(--surface-hover);
        }

        .word-cell {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.05rem;
        }

        .forms-cell {
            color: var(--text-light);
            font-size: 0.85rem;
            font-style: italic;
        }

        /* SFI 进度条 */
        .sfi-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sfi-track {
            width: 60px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .sfi-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.2s;
        }

        .sfi-val {
            font-size: 0.85rem;
            color: var(--text-light);
            width: 40px;
            text-align: right;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.15rem;
            transition: transform 0.1s;
            color: var(--text-light);
            padding: 2px 6px;
        }

        .action-btn:hover {
            transform: scale(1.25);
        }

        .fav-active {
            color: #e74c3c;
        }

        /* ===== 分页 ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 6px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-info {
            color: var(--text-light);
            font-size: 0.9rem;
            margin: 0 8px;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state h2 {
            color: var(--text);
            margin-bottom: 10px;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--bg);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: transparent;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-light);
            line-height: 1;
        }

        .modal h2 {
            font-family: var(--font-serif);
            color: var(--primary);
            margin-bottom: 2px;
            font-size: 2rem;
        }

        .phonetic {
            color: var(--accent);
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        .dict-section {
            margin-bottom: 18px;
            border-left: 3px solid var(--primary);
            padding-left: 16px;
        }

        .pos {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
            font-style: italic;
            margin-bottom: 6px;
        }

        .definition {
            margin-bottom: 6px;
            padding-left: 12px;
            position: relative;
        }

        .definition::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        .example {
            font-size: 0.9rem;
            color: var(--text-light);
            font-style: italic;
            margin-top: 2px;
            padding-left: 12px;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .loader div {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            text-align: center;
            color: #e74c3c;
            padding: 20px;
        }

        /* ===== 页脚 ===== */
        footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .modal {
                padding: 20px 16px;
            }

            th,
            td {
                padding: 6px 8px;
                font-size: 0.9rem;
            }

            .hide-mobile {
                display: none !important;
            }

            .sfi-track {
                width: 40px;
            }

            .status-bar {
                font-size: 0.8rem;
                padding: 4px 10px;
            }
        }
    </style>
</head>

<body>

    <!-- 隐藏的文件选择器 -->
    <input type="file" id="fileInput" accept=".txt,.csv,.tsv" style="display: none;" />

    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>NGSL 词汇表 <span>词典查询</span></h1>
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索单词或词形…" />
                </div>
                <select id="sortSelect">
                    <option value="n">按频率排序</option>
                    <option value="word">按字母排序</option>
                    <option value="sfi">按 SFI 排序</option>
                </select>
                <button class="btn-text" id="loadDataBtn">📁 导入数据</button>
                <button class="btn-icon" id="themeToggle" title="切换主题">🌙</button>
            </div>
        </header>

        <!-- 状态栏 -->
        <div class="status-bar" id="statusBar">
            <span>📊 共 <span class="count" id="dataCount">0</span> 条词汇</span>
            <span class="hint">💡 点击单词查释义 · 按 <kbd>/</kbd> 快速搜索</span>
        </div>

        <!-- 表格 -->
        <div class="table-container">
            <div class="empty-state" id="emptyState">
                <div class="icon">📂</div>
                <h2>暂无数据</h2>
                <p>请点击上方「导入数据」按钮，选择您的 CSV / TXT 文件。<br />支持制表符或逗号分隔。</p>
            </div>
            <table id="dataTable" style="display: none;">
                <thead>
                    <tr>
                        <th data-sort="n" style="width: 56px;">#</th>
                        <th data-sort="word">单词</th>
                        <th class="hide-mobile">相关词形</th>
                        <th data-sort="sfi" style="width: 150px;">SFI 词频</th>
                        <th class="hide-mobile" style="width: 70px;">收藏</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>

        <footer>
            <p>数据来源: NGSL Word List · 词典 API: dictionaryapi.dev</p>
        </footer>
    </div>

    <!-- 词典弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <button class="modal-close" id="modalClose">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // =====================================================================
        //  配置
        // =====================================================================
        const CONFIG = {
            dictionary: {
                baseUrl: "https://api.dictionaryapi.dev/api/v2/entries/en/",
                queryParams: { simple: true },
                apiKey: "",
                apiKeyParam: "key"
            },
            page: { size: 50 }
        };

        // =====================================================================
        //  状态
        // =====================================================================
        let ALL_WORDS = [];
        let filteredWords = [];
        let currentPage = 1;
        let sortBy = 'n';
        let favorites = JSON.parse(localStorage.getItem('ngsl_favs') || '{}');

        // =====================================================================
        //  DOM 引用
        // =====================================================================
        const tableBody = document.getElementById('tableBody');
        const pagination = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');
        const fileInput = document.getElementById('fileInput');
        const loadDataBtn = document.getElementById('loadDataBtn');
        const emptyState = document.getElementById('emptyState');
        const dataTable = document.getElementById('dataTable');
        const dataCount = document.getElementById('dataCount');
        const statusBar = document.getElementById('statusBar');

        // =====================================================================
        //  核心：数据解析（支持多种列顺序，自动检测）
        // =====================================================================
        function parseTextData(text) {
            const lines = text.split(/\r?\n/);
            const result = [];
            let detectedFormat = null; // 'word_first' | 'n_first'

            for (let i = 0; i < lines.length; i++) {
                const raw = lines[i];
                if (!raw.trim()) continue;

                // ---- 跳过常见表头 ----
                const trimmed = raw.trim();
                if (/^(Number|Rank|Word|SFI|Freq|词|单词|排名|词频|频次|sheet_)/i.test(trimmed)) {
                    continue;
                }

                // ---- 分隔 ----
                let parts;
                if (raw.includes('\t')) {
                    parts = raw.split('\t');
                } else if (raw.includes(',')) {
                    parts = raw.split(',');
                } else {
                    // 尝试用空白分割（空格）
                    parts = raw.split(/\s+/);
                }
                const clean = parts.map(p => p.trim()).filter(p => p !== '');
                if (clean.length < 3) continue; // 至少需要 word + sfi + 其他

                // ---- 自动检测列顺序（基于第一行有效数据） ----
                if (detectedFormat === null) {
                    const c0 = clean[0],
                        c1 = clean[1],
                        c2 = clean[2];
                    const isNum0 = !isNaN(parseFloat(c0)) && isFinite(c0);
                    const isNum1 = !isNaN(parseFloat(c1)) && isFinite(c1);
                    const isNum2 = !isNaN(parseFloat(c2)) && isFinite(c2);

                    if (!isNum0 && isNum1 && isNum2) {
                        // [word, number, number, ...] → word_first
                        detectedFormat = 'word_first';
                    } else if (isNum0 && !isNum1 && isNum2) {
                        // [number, word, number, ...] → n_first
                        detectedFormat = 'n_first';
                    } else if (!isNum0 && !isNum1 && isNum2) {
                        // [word, word, number, ...] → 可能是 [word, forms, sfi, ...] 或 [word, word, sfi, ...]
                        // 保守处理：当作 word_first，把第二列作为 forms
                        detectedFormat = 'word_first';
                    } else {
                        // 无法判断，默认 n_first
                        detectedFormat = 'n_first';
                    }
                    console.log('[解析] 检测到格式:', detectedFormat);
                }

                // ---- 按格式解析 ----
                let n, word, forms, sfi, u;
                try {
                    if (detectedFormat === 'word_first') {
                        // 用户格式: [word, n, sfi, u] 或 [word, forms, sfi, u] 或 [word, n, forms, sfi, u]
                        word = clean[0];
                        // 判断第二列是数字还是文本
                        const secondIsNum = !isNaN(parseFloat(clean[1])) && isFinite(clean[1]);
                        if (secondIsNum) {
                            // [word, n, sfi, u] 或 [word, n, forms, sfi, u]
                            n = parseInt(clean[1]) || result.length + 1;
                            if (clean.length >= 5) {
                                // [word, n, forms, sfi, u]
                                forms = clean[2];
                                sfi = parseFloat(clean[3]);
                                u = parseInt(clean[4]) || 0;
                            } else {
                                // [word, n, sfi, u]
                                forms = '';
                                sfi = parseFloat(clean[2]);
                                u = parseInt(clean[3]) || 0;
                            }
                        } else {
                            // [word, forms, sfi, u] 或 [word, forms, sfi]
                            forms = clean[1];
                            if (clean.length >= 4) {
                                sfi = parseFloat(clean[2]);
                                u = parseInt(clean[3]) || 0;
                            } else {
                                sfi = parseFloat(clean[2]);
                                u = 0;
                            }
                            n = result.length + 1;
                        }
                    } else {
                        // n_first: [n, word, forms, sfi, u] 或 [n, word, sfi, u]
                        n = parseInt(clean[0]) || result.length + 1;
                        word = clean[1];
                        if (clean.length >= 5) {
                            forms = clean[2];
                            sfi = parseFloat(clean[3]);
                            u = parseInt(clean[4]) || 0;
                        } else {
                            forms = '';
                            sfi = parseFloat(clean[2]);
                            u = parseInt(clean[3]) || 0;
                        }
                    }
                } catch (e) {
                    console.warn('[解析] 跳过行:', raw, e);
                    continue;
                }

                if (!word || isNaN(sfi)) {
                    console.warn('[解析] 跳过无效行:', raw);
                    continue;
                }

                result.push({
                    n: n || result.length + 1,
                    word: word.trim(),
                    forms: forms ? forms.trim() : '',
                    sfi: sfi,
                    u: u || 0
                });
            }

            // 如果检测失败但解析出了数据，按 n 排序
            if (result.length > 0 && detectedFormat === null) {
                result.sort((a, b) => a.n - b.n);
            }

            return result;
        }

        // =====================================================================
        //  加载数据文件
        // =====================================================================
        function loadDataFile(file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const text = e.target.result;
                const parsed = parseTextData(text);
                if (parsed.length === 0) {
                    alert('❌ 未能解析到有效数据。\n请检查文件格式是否为制表符或逗号分隔，且包含单词、SFI 等列。');
                    return;
                }
                ALL_WORDS = parsed;
                console.log('[加载] 成功解析', ALL_WORDS.length, '条数据');
                // 更新界面
                emptyState.style.display = 'none';
                dataTable.style.display = 'table';
                dataCount.textContent = ALL_WORDS.length;
                filterAndSort();
            };
            reader.onerror = function () {
                alert('❌ 读取文件失败，请重试。');
            };
            reader.readAsText(file);
        }

        // =====================================================================
        //  渲染表格
        // =====================================================================
        function renderTable() {
            const start = (currentPage - 1) * CONFIG.page.size;
            const end = Math.min(start + CONFIG.page.size, filteredWords.length);
            const pageData = filteredWords.slice(start, end);

            if (pageData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-light);">🔍 没有匹配的单词</td></tr>`;
                return;
            }

            tableBody.innerHTML = pageData.map(item => {
                // SFI 进度条宽度：将 SFI 映射到 0~100%，基于常见范围 40~90
                const pct = Math.min(100, Math.max(2, ((item.sfi - 35) / 55) * 100));
                const isFav = favorites[item.word] ? 'fav-active' : '';
                return `
                        <tr onclick="fetchDictionary('${item.word}')">
                            <td>${item.n}</td>
                            <td class="word-cell">${item.word}</td>
                            <td class="forms-cell hide-mobile">${item.forms || '—'}</td>
                            <td>
                                <div class="sfi-bar">
                                    <div class="sfi-track">
                                        <div class="sfi-fill" style="width:${pct}%;"></div>
                                    </div>
                                    <span class="sfi-val">${item.sfi.toFixed(1)}</span>
                                </div>
                            </td>
                            <td class="hide-mobile" onclick="event.stopPropagation()">
                                <button class="action-btn ${isFav}" onclick="toggleFav('${item.word}', this)">♥</button>
                            </td>
                        </tr>
                    `;
            }).join('');
        }

        // =====================================================================
        //  分页
        // =====================================================================
        function renderPagination() {
            const total = filteredWords.length;
            const totalPages = Math.ceil(total / CONFIG.page.size) || 1;
            if (totalPages <= 1) {
                pagination.innerHTML = `<span class="page-info">共 ${total} 条</span>`;
                return;
            }

            let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;

            const maxShow = 5;
            let startP = Math.max(1, currentPage - Math.floor(maxShow / 2));
            let endP = Math.min(totalPages, startP + maxShow - 1);
            if (endP - startP + 1 < maxShow) {
                startP = Math.max(1, endP - maxShow + 1);
            }

            if (startP > 1) {
                html += `<button class="page-btn" onclick="changePage(1)">1</button>`;
                if (startP > 2) html += `<span>…</span>`;
            }
            for (let i = startP; i <= endP; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
            if (endP < totalPages) {
                if (endP < totalPages - 1) html += `<span>…</span>`;
                html += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
            }

            html +=
                `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
            html += `<span class="page-info">共 ${total} 条</span>`;
            pagination.innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredWords.length / CONFIG.page.size) || 1;
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // =====================================================================
        //  筛选 & 排序
        // =====================================================================
        function filterAndSort() {
            if (ALL_WORDS.length === 0) return;

            const q = searchInput.value.toLowerCase().trim();
            filteredWords = ALL_WORDS.filter(item => {
                if (!q) return true;
                if (item.word.toLowerCase().includes(q)) return true;
                if (item.forms && item.forms.toLowerCase().includes(q)) return true;
                return false;
            });

            // 排序
            if (sortBy === 'n') {
                filteredWords.sort((a, b) => a.n - b.n);
            } else if (sortBy === 'word') {
                filteredWords.sort((a, b) => a.word.localeCompare(b.word));
            } else if (sortBy === 'sfi') {
                filteredWords.sort((a, b) => b.sfi - a.sfi);
            }

            dataCount.textContent = ALL_WORDS.length;
            currentPage = 1;
            renderTable();
            renderPagination();
        }

        // =====================================================================
        //  词典查询
        // =====================================================================
        async function fetchDictionary(word) {
            if (!word) return;
            modalOverlay.classList.add('active');
            modalBody.innerHTML = `<div class="loader"><div></div>正在查询 “${word}”…</div>`;

            try {
                const url = new URL(CONFIG.dictionary.baseUrl + encodeURIComponent(word));
                for (const [k, v] of Object.entries(CONFIG.dictionary.queryParams)) {
                    url.searchParams.set(k, v);
                }
                if (CONFIG.dictionary.apiKey) {
                    url.searchParams.set(CONFIG.dictionary.apiKeyParam, CONFIG.dictionary.apiKey);
                }

                const resp = await fetch(url.toString());
                if (!resp.ok) throw new Error('未找到该单词的释义');
                const data = await resp.json();
                renderDictModal(word, data);
            } catch (err) {
                modalBody.innerHTML = `
                        <h2>${word}</h2>
                        <div class="error-msg"><p>❌ ${err.message}</p></div>
                    `;
            }
        }

        function renderDictModal(word, data) {
            let html = `<h2>${word}</h2>`;
            const entry = data[0];
            if (entry) {
                const ph = entry.phonetic || (entry.phonetics && entry.phonetics.find(p => p.text)?.text);
                if (ph) html += `<div class="phonetic">${ph}</div>`;

                if (entry.meanings) {
                    entry.meanings.forEach(m => {
                        html += `<div class="dict-section"><div class="pos">${m.partOfSpeech}</div>`;
                        (m.definitions || []).slice(0, 4).forEach(d => {
                            html += `<div class="definition">${d.definition}</div>`;
                            if (d.example) html += `<div class="example">“${d.example}”</div>`;
                        });
                        html += `</div>`;
                    });
                }
            }
            modalBody.innerHTML = html || `<p>未找到释义</p>`;
        }

        // =====================================================================
        //  收藏
        // =====================================================================
        function toggleFav(word, btn) {
            if (favorites[word]) {
                delete favorites[word];
                btn.classList.remove('fav-active');
            } else {
                favorites[word] = true;
                btn.classList.add('fav-active');
            }
            localStorage.setItem('ngsl_favs', JSON.stringify(favorites));
        }

        // =====================================================================
        //  事件绑定
        // =====================================================================

        // 搜索（防抖）
        let searchTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(filterAndSort, 280);
        });

        // 排序下拉
        sortSelect.addEventListener('change', (e) => {
            sortBy = e.target.value;
            filterAndSort();
        });

        // 表头点击排序
        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                sortBy = th.dataset.sort;
                sortSelect.value = sortBy;
                filterAndSort();
            });
        });

        // 弹窗关闭
        modalClose.addEventListener('click', () => modalOverlay.classList.remove('active'));
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('active');
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') modalOverlay.classList.remove('active');
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // 导入数据
        loadDataBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadDataFile(file);
            e.target.value = ''; // 允许重复选择同一文件
        });

        // 主题切换
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('ngsl_theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            if (cur === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
                localStorage.setItem('ngsl_theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
                localStorage.setItem('ngsl_theme', 'dark');
            }
        });

        // =====================================================================
        //  自动加载同目录下的 data.txt
        // =====================================================================
        async function autoLoad() {
            try {
                const resp = await fetch('data.txt');
                if (resp.ok) {
                    const text = await resp.text();
                    const parsed = parseTextData(text);
                    if (parsed.length > 0) {
                        ALL_WORDS = parsed;
                        console.log('[自动加载] 成功加载 data.txt，共', ALL_WORDS.length, '条');
                        emptyState.style.display = 'none';
                        dataTable.style.display = 'table';
                        dataCount.textContent = ALL_WORDS.length;
                        filterAndSort();
                        return;
                    }
                }
            } catch (_) { /* 忽略 */ }
            // 没有自动加载成功，显示空状态
            emptyState.style.display = 'block';
            dataTable.style.display = 'none';
            dataCount.textContent = '0';
            console.log('[自动加载] 未找到 data.txt，请手动导入');
        }
        autoLoad();

        // =====================================================================
        //  暴露全局函数供 onclick 调用
        // =====================================================================
        window.fetchDictionary = fetchDictionary;
        window.toggleFav = toggleFav;
        window.changePage = changePage;
    </script>
</body>

</html>
