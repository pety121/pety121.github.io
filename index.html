<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGSL 词汇表 · 紧凑查询器</title>
    <style>
        :root {
            --bg: #faf7f1;
            --surface: #fffdf8;
            --surface-hover: #f5efdf;
            --text: #2b2b2b;
            --text-light: #666;
            --primary: #1f6f5c;
            --primary-light: #e6f2ee;
            --accent: #c98a2b;
            --border: #e0d8c8;
            --border-strong: #c8bfa8;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 6px;
            --table-border: #d0c7b0;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --surface: #252525;
            --surface-hover: #303030;
            --text: #e0e0e0;
            --text-light: #999;
            --primary: #3eb094;
            --primary-light: #2a3f38;
            --accent: #e0a84b;
            --border: #333;
            --border-strong: #444;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --table-border: #3a3a3a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 10px;
        }

        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-family: Georgia, 'Times New Roman', serif;
            color: var(--primary);
            font-size: clamp(1.3rem, 3.5vw, 1.8rem);
            font-weight: 700;
        }

        h1 span {
            color: var(--accent);
            font-size: 0.65em;
            font-weight: normal;
            margin-left: 8px;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"] {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            width: clamp(150px, 25vw, 250px);
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .search-box {
            position: relative;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .search-box input {
            padding-left: 30px;
        }

        .btn-icon, .btn-text {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--text);
            padding: 6px 10px;
            white-space: nowrap;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            font-size: 1rem;
            padding: 0;
        }

        .btn-icon:hover, .btn-text:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-icon:active, .btn-text:active {
            transform: scale(0.95);
        }

        .table-container {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* 严格控制列宽 */
        }

        th, td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--table-border);
            border-right: 1px solid var(--table-border);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        th:last-child, td:last-child {
            border-right: none;
        }

        /* 列宽配置：适应最长单词和45字符词形 */
        th:nth-child(1), td:nth-child(1) { width: 45px; text-align: right; } /* # */
        th:nth-child(2), td:nth-child(2) { width: 120px; } /* 单词 (足够放14-15个字母) */
        th:nth-child(3), td:nth-child(3) { width: auto; } /* 相关词形 (占据剩余空间，电脑端足够45字符) */
        th:nth-child(4), td:nth-child(4) { width: 110px; } /* SFI */
        th:nth-child(5), td:nth-child(5) { width: 60px; text-align: center; } /* 操作 */

        thead th {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 0.9rem;
        }
        
        [data-theme="dark"] thead th {
            background-color: var(--surface);
            border-bottom: 2px solid var(--primary);
        }

        thead th:hover {
            background-color: var(--primary);
            color: #fff;
        }

        thead th.active-sort::after {
            content: " ↑";
            font-size: 0.8em;
        }

        thead th.active-sort.desc::after {
            content: " ↓";
        }

        tbody tr {
            transition: background-color 0.1s;
        }

        tbody tr:hover {
            background-color: var(--surface-hover);
        }

        .word-cell {
            font-weight: 600;
            color: var(--primary);
            font-size: 1rem;
            cursor: pointer;
        }

        .word-cell:hover {
            text-decoration: underline;
        }

        .forms-cell {
            color: var(--text-light);
            font-size: 0.85rem;
            font-style: italic;
            cursor: pointer; /* 手机端点击查看完整内容 */
        }

        .forms-cell:hover {
            color: var(--accent);
        }

        .sfi-bar {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sfi-track {
            width: 50px;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sfi-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
        }

        .sfi-val {
            font-size: 0.8rem;
            color: var(--text-light);
            width: 30px;
            text-align: right;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.1s;
            color: var(--text-light);
        }

        .action-btn:hover {
            transform: scale(1.2);
        }

        .fav-active {
            color: #e74c3c;
        }

        .custom-def-row {
            background: var(--primary-light);
        }

        .custom-def-row td {
            border-right: none;
            padding: 8px 15px;
            font-size: 0.85rem;
            color: var(--text);
            white-space: normal;
        }

        .custom-def-row td strong {
            color: var(--primary);
            margin-right: 5px;
        }

        /* 无分页模式 */
        .no-pagination .pagination {
            display: none;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 6px 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-state h2 {
            color: var(--text);
            margin-bottom: 10px;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg);
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            line-height: 1;
        }

        .modal h2 {
            font-family: Georgia, serif;
            color: var(--primary);
            margin-bottom: 16px;
            font-size: 1.5rem;
        }

        .definition-editor {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
        }

        .modal-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .modal-footer button {
            padding: 8px 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-footer button:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .forms-viewer {
            font-size: 1.1rem;
            color: var(--text);
            line-height: 1.6;
            word-break: break-all;
        }

        footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-light);
            font-size: 0.85rem;
            padding: 10px 0;
        }

        /* 响应式设计：手机端调整 */
        @media (max-width: 600px) {
            .container {
                padding: 0 5px;
            }
            
            header {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            
            .controls {
                width: 100%;
                justify-content: space-between;
            }
            
            input[type="text"] {
                width: 100%;
                max-width: none;
            }
            
            /* 手机端列宽调整 */
            th:nth-child(1), td:nth-child(1) { width: 35px; } /* # */
            th:nth-child(2), td:nth-child(2) { width: 80px; } /* 单词 */
            th:nth-child(3), td:nth-child(3) { width: auto; } /* 词形 (占据剩余空间) */
            th:nth-child(4), td:nth-child(4) { width: 70px; } /* SFI */
            th:nth-child(5), td:nth-child(5) { width: 35px; } /* 操作 */
            
            .sfi-track { width: 30px; }
            .sfi-val { display: none; } /* 手机端隐藏具体数值，只看进度条 */
            
            .modal {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NGSL 词汇表 <span>紧凑查询器</span></h1>
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索单词或词形...">
                </div>
                <button class="btn-text" id="paginationToggle" title="切换分页模式">📄 全部</button>
                <button class="btn-icon" id="themeToggle" title="切换主题">🌙</button>
            </div>
        </header>

        <main>
            <div class="table-container">
                <div class="empty-state" id="emptyState">
                    <h2>暂无数据</h2>
                    <p>请确保同级目录下存在 data.txt 文件。</p>
                </div>
                <table id="dataTable" style="display: none;">
                    <thead>
                        <tr>
                            <th data-sort="n">#</th>
                            <th data-sort="word">单词</th>
                            <th data-sort="forms">相关词形</th>
                            <th data-sort="sfi">SFI 词频</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </main>

        <footer>
            <p>数据来源: NGSL Word List · 快捷键: / 搜索, ESC 关闭弹窗</p>
        </footer>
    </div>

    <!-- 通用模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <button class="modal-close" id="modalClose">×</button>
            <h2 id="modalTitle">编辑自定义释义</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ================= 配置区 =================
        const CONFIG = {
            page: {
                size: 50 // 每页显示条数
            },
            storage: {
                favorites: 'ngsl_favs',
                theme: 'ngsl_theme',
                paginationMode: 'ngsl_pagination',
                customDefs: 'ngsl_custom_defs'
            }
        };

        let ALL_WORDS = []; 
        let filteredWords = [];
        let currentPage = 1;
        let sortBy = 'n';
        let sortDir = 'asc'; 
        let favorites = JSON.parse(localStorage.getItem(CONFIG.storage.favorites) || '{}');
        let customDefinitions = JSON.parse(localStorage.getItem(CONFIG.storage.customDefs) || '{}');
        let isPaginationEnabled = localStorage.getItem(CONFIG.storage.paginationMode) !== 'false';

        // ================= DOM 元素 =================
        const tableBody = document.getElementById('tableBody');
        const pagination = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const emptyState = document.getElementById('emptyState');
        const dataTable = document.getElementById('dataTable');
        const paginationToggle = document.getElementById('paginationToggle');
        const themeToggle = document.getElementById('themeToggle');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');

        let currentEditingWord = null;

        // ================= 数据解析与加载 =================
        // 增强版 CSV 解析器，正确处理引号和内部逗号
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if ((char === ',' || char === '\t') && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function parseTextData(text) {
            const lines = text.trim().split(/\r?\n/);
            const result = [];
            for (let line of lines) {
                if (!line || line.startsWith('Number') || line.startsWith('sheet_')) continue;
                
                const parts = parseCSVLine(line);
                const cleanParts = parts.filter(p => p !== '');
                
                if (cleanParts.length >= 4) {
                    let n, word, forms, sfi, u;
                    if (cleanParts.length === 4) {
                        [n, word, sfi, u] = cleanParts;
                        forms = '';
                    } else {
                        [n, word, forms, sfi, u] = cleanParts;
                    }
                    
                    if (isNaN(parseFloat(sfi))) continue; 

                    result.push({
                        n: parseInt(n) || result.length + 1,
                        word: word,
                        forms: forms,
                        sfi: parseFloat(sfi),
                        u: parseInt(u) || 0
                    });
                }
            }
            return result;
        }

        // ================= 渲染逻辑 =================
        function renderTable() {
            const start = (currentPage - 1) * CONFIG.page.size;
            const end = start + CONFIG.page.size;
            const pageData = isPaginationEnabled ? filteredWords.slice(start, end) : filteredWords;

            tableBody.innerHTML = pageData.map(item => {
                const sfiWidth = Math.max(10, (item.sfi - 40) * 2.5);
                const isFav = favorites[item.word] ? 'fav-active' : '';
                const hasCustomDef = customDefinitions[item.word] ? true : false;
                
                return `
                    <tr>
                        <td>${item.n}</td>
                        <td class="word-cell" onclick="openDefEditor('${item.word}')">${item.word}</td>
                        <td class="forms-cell" onclick="openFormsViewer('${item.word}')">${item.forms || '-'}</td>
                        <td>
                            <div class="sfi-bar">
                                <div class="sfi-track">
                                    <div class="sfi-fill" style="width: ${sfiWidth}%;"></div>
                                </div>
                                <span class="sfi-val">${item.sfi}</span>
                            </div>
                        </td>
                        <td>
                            <button class="action-btn ${isFav}" onclick="event.stopPropagation(); toggleFav('${item.word}', this)">♥</button>
                        </td>
                    </tr>
                    ${hasCustomDef ? `
                    <tr class="custom-def-row">
                        <td colspan="5">
                            <strong>释义:</strong> ${customDefinitions[item.word]}
                        </td>
                    </tr>
                    ` : ''}
                `;
            }).join('');
        }

        function renderPagination() {
            if (!isPaginationEnabled) {
                pagination.innerHTML = '';
                return;
            }

            const totalPages = Math.ceil(filteredWords.length / CONFIG.page.size);
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            
            const maxPagesToShow = 7;
            let startPage = Math.max(1, currentPage - 3);
            let endPage = Math.min(totalPages, startPage + maxPagesToShow - 1);
            
            if (endPage - startPage + 1 < maxPagesToShow) {
                startPage = Math.max(1, endPage - maxPagesToShow + 1);
            }

            if (startPage > 1) {
                html += `<button class="page-btn" onclick="changePage(1)">1</button>`;
                if (startPage > 2) html += `<span>...</span>`;
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span>...</span>`;
                html += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
            }

            html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredWords.length / CONFIG.page.size);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterAndSort() {
            if (ALL_WORDS.length === 0) return;
            
            const query = searchInput.value.toLowerCase().trim();
            filteredWords = ALL_WORDS.filter(item => {
                if (!query) return true;
                if (item.word.toLowerCase().includes(query)) return true;
                if (item.forms.toLowerCase().includes(query)) return true;
                if (customDefinitions[item.word] && customDefinitions[item.word].toLowerCase().includes(query)) return true;
                return false;
            });

            if (sortBy === 'n') {
                filteredWords.sort((a, b) => sortDir === 'asc' ? a.n - b.n : b.n - a.n);
            } else if (sortBy === 'word') {
                filteredWords.sort((a, b) => sortDir === 'asc' ? a.word.localeCompare(b.word) : b.word.localeCompare(a.word));
            } else if (sortBy === 'sfi') {
                filteredWords.sort((a, b) => sortDir === 'asc' ? a.sfi - b.sfi : b.sfi - a.sfi);
            } else if (sortBy === 'forms') {
                filteredWords.sort((a, b) => sortDir === 'asc' ? a.forms.localeCompare(b.forms) : b.forms.localeCompare(a.forms));
            }

            currentPage = 1;
            renderTable();
            renderPagination();
            updateSortIndicators();
        }

        function updateSortIndicators() {
            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.classList.remove('active-sort', 'desc');
                if (th.dataset.sort === sortBy) {
                    th.classList.add('active-sort');
                    if (sortDir === 'desc') {
                        th.classList.add('desc');
                    }
                }
            });
        }

        // ================= 交互与模态框 =================
        function toggleFav(word, btn) {
            if (favorites[word]) {
                delete favorites[word];
                btn.classList.remove('fav-active');
            } else {
                favorites[word] = true;
                btn.classList.add('fav-active');
            }
            localStorage.setItem(CONFIG.storage.favorites, JSON.stringify(favorites));
        }

        function openFormsViewer(word) {
            const item = ALL_WORDS.find(w => w.word === word);
            if (item && item.forms) {
                modalTitle.textContent = `词形详情: ${word}`;
                modalBody.innerHTML = `
                    <div class="forms-viewer">${item.forms}</div>
                    <div class="modal-footer">
                        <button onclick="modalOverlay.classList.remove('active')">关闭</button>
                    </div>
                `;
                modalOverlay.classList.add('active');
            }
        }

        function openDefEditor(word) {
            currentEditingWord = word;
            modalTitle.textContent = `编辑自定义释义: ${word}`;
            modalBody.innerHTML = `
                <textarea class="definition-editor" id="definitionEditor" placeholder="在此输入单词的简短英文释义...">${customDefinitions[word] || ''}</textarea>
                <div class="modal-footer">
                    ${customDefinitions[word] ? `<button onclick="clearDef()" style="margin-right: auto; color: #e74c3c; border-color: #e74c3c;">删除释义</button>` : ''}
                    <button onclick="modalOverlay.classList.remove('active')">取消</button>
                    <button onclick="saveDef()">保存</button>
                </div>
            `;
            modalOverlay.classList.add('active');
            setTimeout(() => document.getElementById('definitionEditor').focus(), 100);
        }

        function saveDef() {
            if (currentEditingWord) {
                const def = document.getElementById('definitionEditor').value.trim();
                if (def) {
                    customDefinitions[currentEditingWord] = def;
                } else {
                    delete customDefinitions[currentEditingWord];
                }
                localStorage.setItem(CONFIG.storage.customDefs, JSON.stringify(customDefinitions));
                modalOverlay.classList.remove('active');
                renderTable(); 
            }
        }

        function clearDef() {
            if (currentEditingWord && confirm('确定要删除此单词的自定义释义吗？')) {
                delete customDefinitions[currentEditingWord];
                localStorage.setItem(CONFIG.storage.customDefs, JSON.stringify(customDefinitions));
                modalOverlay.classList.remove('active');
                renderTable(); 
            }
        }

        // 搜索防抖
        let searchTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(filterAndSort, 300);
        });

        // 排序绑定
        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const sortKey = th.dataset.sort;
                if (sortBy === sortKey) {
                    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    sortBy = sortKey;
                    sortDir = 'asc';
                }
                filterAndSort();
            });
        });

        // 模态框关闭
        modalClose.addEventListener('click', () => modalOverlay.classList.remove('active'));
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('active');
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') modalOverlay.classList.remove('active');
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // 分页模式切换
        function updatePaginationButton() {
            if (isPaginationEnabled) {
                document.body.classList.remove('no-pagination');
                paginationToggle.textContent = '📄 全部'; // 当前是分页，点击变全部
            } else {
                document.body.classList.add('no-pagination');
                paginationToggle.textContent = '📄 分页'; // 当前是全部，点击变分页
            }
        }

        paginationToggle.addEventListener('click', () => {
            isPaginationEnabled = !isPaginationEnabled;
            localStorage.setItem(CONFIG.storage.paginationMode, isPaginationEnabled);
            updatePaginationButton();
            currentPage = 1;
            renderTable();
            renderPagination();
        });

        // 主题切换
        const savedTheme = localStorage.getItem(CONFIG.storage.theme) || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
                localStorage.setItem(CONFIG.storage.theme, 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
                localStorage.setItem(CONFIG.storage.theme, 'dark');
            }
        });

        // 初始化
        updatePaginationButton();

        // 自动加载本地 data.txt
        async function autoLoad() {
            try {
                const response = await fetch('data.txt');
                if (response.ok) {
                    const text = await response.text();
                    ALL_WORDS = parseTextData(text);
                    if (ALL_WORDS.length > 0) {
                        emptyState.style.display = 'none';
                        dataTable.style.display = 'table';
                        filterAndSort();
                    }
                }
            } catch (e) {
                console.log("自动加载本地文件失败，请确保 data.txt 存在。");
            }
        }
        autoLoad();
    </script>
</body>
</html>
